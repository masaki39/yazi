[mgr]
show_hidden = true
ratio = [0, 1, 3]

[preview]
max_width = 1920
max_height = 1920

[opener]
edit = [{ run = 'nvim "$@"', block = true, for = "unix" }]

[plugin]
prepend_previewers = [{ mime = "application/dicom", run = "magick" }]
append_previewers = [
  { mime = "image/tiff", run = "magick" },
  { name = "*.jsonl", run = "json" },
]
prepend_fetchers = [
  { id = "git", url = "*", run = "git" },
  { id = "git", url = "*/", run = "git" },
]
